<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>太吾功法快速筛选</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe2;
      --panel: #fffaf0;
      --ink: #2a241d;
      --muted: #6b6256;
      --line: #d7ccb8;
      --accent: #7b3f00;
      --accent-soft: #efe0c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eadfc7 0%, var(--bg) 220px);
    }
    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero, .panel {
      background: rgba(255, 250, 240, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(80, 52, 24, 0.08);
    }
    .hero {
      padding: 24px;
      margin-bottom: 16px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .hero p, .hero li, .meta {
      color: var(--muted);
      line-height: 1.6;
    }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 14px;
    }
    .panel {
      padding: 16px;
      margin-bottom: 16px;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: white;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 600;
    }
    button.secondary {
      background: var(--accent-soft);
      color: var(--ink);
      border-color: var(--line);
    }
    .toolbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .toolbar .summary {
      color: var(--muted);
      font-size: 14px;
    }
    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 280px);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1280px;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #f2e6d0;
      z-index: 1;
      text-align: left;
      white-space: nowrap;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee4d1;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.5;
    }
    tbody tr:hover {
      background: #fff8ea;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f5ead6;
      border: 1px solid #e4d1af;
      margin: 0 6px 6px 0;
      white-space: nowrap;
      font-size: 12px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .small {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .page { padding: 12px; }
      .hero h1 { font-size: 24px; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>太吾功法快速筛选</h1>
      <p>本地单文件工具。可按门派、品级、内力属性、build 分类轴、细机制标签、正练关键词、逆练关键词快速筛选，直接服务前期和后期 build。</p>
      <div class="meta">
        <span>数据源：`taiwu_gongfa_kb_v1.json`</span>
        <span id="meta-records"></span>
      </div>
    </section>

    <section class="panel">
      <div class="filters">
        <div>
          <label for="filter-search">综合搜索</label>
          <input id="filter-search" type="search" placeholder="功法名 / 摘要 / 标签 / 备注">
        </div>
        <div>
          <label for="filter-type">大类</label>
          <select id="filter-type"></select>
        </div>
        <div>
          <label for="filter-build-lv1">Build大类</label>
          <select id="filter-build-lv1"></select>
        </div>
        <div>
          <label for="filter-build-lv2">Build细类</label>
          <select id="filter-build-lv2"></select>
        </div>
        <div>
          <label for="filter-faction">门派</label>
          <select id="filter-faction"></select>
        </div>
        <div>
          <label for="filter-grade">品级</label>
          <select id="filter-grade"></select>
        </div>
        <div>
          <label for="filter-inner">内力属性</label>
          <select id="filter-inner"></select>
        </div>
        <div>
          <label for="filter-recommend">推荐目录</label>
          <select id="filter-recommend"></select>
        </div>
        <div>
          <label for="filter-fine-tag">细机制标签</label>
          <select id="filter-fine-tag"></select>
        </div>
        <div>
          <label for="filter-positive">正练关键词</label>
          <input id="filter-positive" type="search" placeholder="比如：增伤 / 减耗 / 闪避">
        </div>
        <div>
          <label for="filter-negative">逆练关键词</label>
          <input id="filter-negative" type="search" placeholder="比如：反震 / 命中 / 恢复">
        </div>
        <div>
          <label for="filter-tag">粗标签</label>
          <select id="filter-tag"></select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="reset-btn" class="secondary" type="button">清空筛选</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="summary" id="summary"></div>
        <div class="small">排序：推荐目录内优先，其次按类型、品级、门派、名称</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>功法</th>
              <th>类型</th>
              <th>Build分类</th>
              <th>门派</th>
              <th>品级</th>
              <th>属性</th>
              <th>推荐目录</th>
              <th>细标签</th>
              <th>粗标签</th>
              <th>正练</th>
              <th>逆练</th>
              <th>摘要</th>
            </tr>
          </thead>
          <tbody id="result-body"></tbody>
        </table>
      </div>
    </section>
  </div>

    const GRADE_ORDER = ["下·九品", "中·八品", "上·七品", "奇·六品", "秘·五品", "极·四品", "超·三品", "绝·二品", "神·一品"];
    const BUILD_LV1_ORDER = ["内功", "摧破", "轻灵", "护体", "奇窍"];

    const ids = {
      search: document.getElementById("filter-search"),
      type: document.getElementById("filter-type"),
      buildLv1: document.getElementById("filter-build-lv1"),
      buildLv2: document.getElementById("filter-build-lv2"),
      faction: document.getElementById("filter-faction"),
      grade: document.getElementById("filter-grade"),
      inner: document.getElementById("filter-inner"),
      recommend: document.getElementById("filter-recommend"),
      fineTag: document.getElementById("filter-fine-tag"),
      positive: document.getElementById("filter-positive"),
      negative: document.getElementById("filter-negative"),
      tag: document.getElementById("filter-tag"),
      reset: document.getElementById("reset-btn"),
      summary: document.getElementById("summary"),
      body: document.getElementById("result-body"),
      metaRecords: document.getElementById("meta-records"),
    };

    function norm(value) {
      return String(value || "").trim().toLowerCase();
    }

    function optionValues(items, getValue) {
      return [...new Set(items.map(getValue).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
    }

    function fillSelect(node, values, placeholder) {
      node.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = placeholder;
      node.appendChild(first);
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        node.appendChild(option);
      });
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function shortText(text, limit = 96) {
      const clean = String(text || "").replaceAll("\n", " / ").trim();
      return clean.length <= limit ? clean : clean.slice(0, limit - 1) + "…";
    }

    function recommendPath(row) {
      return [row.recommend_path_lv1, row.recommend_path_lv2, row.recommend_path_lv3].filter(Boolean).join(" / ");
    }

    function buildBucketPath(row) {
      return [row.build_bucket_lv1, row.build_bucket_lv2].filter(Boolean).join(" / ");
    }

    function rowSearchText(row) {
      return [
        row.title,
        row.page_title,
        row.type_main,
        row.type_sub,
        row.build_bucket_lv1,
        row.build_bucket_lv2,
        row.faction,
        row.grade_raw,
        row.inner_property,
        row.effect_summary_raw,
        row.positive_effect_raw,
        row.negative_effect_raw,
        (row.effect_tags || []).join(" "),
        (row.effect_tags_fine || []).join(" "),
        buildBucketPath(row),
        recommendPath(row),
        row.notes,
      ].join("\n");
    }

    function matches(row) {
      if (ids.type.value && row.type_main !== ids.type.value) return false;
      if (ids.buildLv1.value && row.build_bucket_lv1 !== ids.buildLv1.value) return false;
      if (ids.buildLv2.value && row.build_bucket_lv2 !== ids.buildLv2.value) return false;
      if (ids.faction.value && row.faction !== ids.faction.value) return false;
      if (ids.grade.value && row.grade_raw !== ids.grade.value) return false;
      if (ids.inner.value && row.inner_property !== ids.inner.value) return false;
      if (ids.recommend.value && recommendPath(row) !== ids.recommend.value) return false;
      if (ids.fineTag.value && !(row.effect_tags_fine || []).includes(ids.fineTag.value)) return false;
      if (ids.tag.value && !(row.effect_tags || []).includes(ids.tag.value)) return false;
      if (ids.search.value && !norm(rowSearchText(row)).includes(norm(ids.search.value))) return false;
      if (ids.positive.value && !norm(row.positive_effect_raw).includes(norm(ids.positive.value))) return false;
      if (ids.negative.value && !norm(row.negative_effect_raw).includes(norm(ids.negative.value))) return false;
      return true;
    }

    function render() {
      const filtered = RECORDS.filter(matches).sort((a, b) => {
        return (
          (a.build_bucket_lv1 || "未分类").localeCompare(b.build_bucket_lv1 || "未分类", "zh-Hans-CN") ||
          (a.build_bucket_lv2 || "").localeCompare(b.build_bucket_lv2 || "", "zh-Hans-CN") ||
          (a.grade_sort || 99) - (b.grade_sort || 99) ||
          (a.faction || "").localeCompare(b.faction || "", "zh-Hans-CN") ||
          (a.title || "").localeCompare(b.title || "", "zh-Hans-CN")
        );
      });

      ids.summary.textContent = "当前命中 " + filtered.length + " / " + RECORDS.length + " 条";
      ids.body.innerHTML = filtered.map((row) => {
        const fineTags = (row.effect_tags_fine || []).map((tag) => '<span class="pill">' + escapeHtml(tag) + '</span>').join("");
        const coarseTags = (row.effect_tags || []).map((tag) => '<span class="pill">' + escapeHtml(tag) + '</span>').join("");
        const recommend = recommendPath(row) || '<span class="small">目录外功法</span>';
        const buildBucket = buildBucketPath(row) + '<div class="small">' + escapeHtml(row.build_bucket_source || "") + ' / ' + escapeHtml(row.build_bucket_confidence || "") + '</div>';
        const typeText = row.type_sub ? row.type_main + " / " + row.type_sub : row.type_main;
        return "<tr>" +
          "<td><strong>" + escapeHtml(row.title) + "</strong><div class=\"mono\">" + escapeHtml(row.page_title) + "</div></td>" +
          "<td>" + escapeHtml(typeText) + "</td>" +
          "<td>" + buildBucket + "</td>" +
          "<td>" + escapeHtml(row.faction || "") + "</td>" +
          "<td>" + escapeHtml(row.grade_raw || "") + "</td>" +
          "<td>" + escapeHtml(row.inner_property || "") + "</td>" +
          "<td>" + recommend + "</td>" +
          "<td>" + fineTags + "</td>" +
          "<td>" + coarseTags + "</td>" +
          "<td>" + escapeHtml(shortText(row.positive_effect_raw, 120)) + "</td>" +
          "<td>" + escapeHtml(shortText(row.negative_effect_raw, 120)) + "</td>" +
          "<td>" + escapeHtml(shortText(row.effect_summary_raw, 120)) + "</td>" +
        "</tr>";
      }).join("");
    }

    function resetFilters() {
      Object.values(ids).forEach((node) => {
        if (!node || !("value" in node) || node === ids.summary || node === ids.body || node === ids.metaRecords) return;
        node.value = "";
      });
      render();
    }

    function init() {
      fillSelect(ids.type, optionValues(RECORDS, (row) => row.type_main), "全部大类");
      fillSelect(ids.buildLv1, BUILD_LV1_ORDER.filter((lv1) => RECORDS.some((row) => row.build_bucket_lv1 === lv1)), "全部Build大类");
      fillSelect(ids.buildLv2, optionValues(RECORDS, (row) => row.build_bucket_lv2), "全部Build细类");
      fillSelect(ids.faction, optionValues(RECORDS, (row) => row.faction), "全部门派");
      fillSelect(ids.grade, GRADE_ORDER.filter((grade) => RECORDS.some((row) => row.grade_raw === grade)), "全部品级");
      fillSelect(ids.inner, optionValues(RECORDS, (row) => row.inner_property), "全部属性");
      fillSelect(ids.recommend, optionValues(RECORDS, (row) => recommendPath(row)), "全部推荐目录");
      const fineTags = [...new Set(RECORDS.flatMap((row) => row.effect_tags_fine || []))].sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      fillSelect(ids.fineTag, fineTags, "全部细机制标签");
      const tags = [...new Set(RECORDS.flatMap((row) => row.effect_tags || []))].sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      fillSelect(ids.tag, tags, "全部粗标签");
      [ids.search, ids.type, ids.buildLv1, ids.buildLv2, ids.faction, ids.grade, ids.inner, ids.recommend, ids.fineTag, ids.positive, ids.negative, ids.tag].forEach((node) => {
        node.addEventListener("input", render);
        node.addEventListener("change", render);
      });
      ids.reset.addEventListener("click", resetFilters);
      ids.metaRecords.textContent = "共 " + RECORDS.length + " 条记录";
      render();
    }

    init();
  </script>
